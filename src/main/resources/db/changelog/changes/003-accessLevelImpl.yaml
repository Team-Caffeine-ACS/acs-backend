databaseChangeLog:
  - changeSet:
        id: 003-01-visit-pre-registration-fields
        author: dev
        changes:
          - addColumn:
              tableName: visit
              columns:
                - column:
                    name: status
                    type: varchar(32)
                    defaultValue: PRE_REGISTERED
                    constraints:
                      nullable: false
                - column:
                    name: notes
                    type: varchar(1024)
                - column:
                    name: access_level
                    type: varchar(32)
                - column:
                    name: visitor_email
                    type: varchar(255)
          - addColumn:
              tableName: visit
              columns:
                - column:
                    name: visitor_full_name
                    type: varchar(255)
          - addColumn:
              tableName: visit
              columns:
                - column:
                    name: created_at
                    type: timestamp

          - dropNotNullConstraint:
              tableName: visit
              columnName: visitor_person_in_role_id
              columnDataType: uuid
          - dropNotNullConstraint:
              tableName: visit
              columnName: assignor_person_in_role_id
              columnDataType: uuid
          - dropNotNullConstraint:
              tableName: visit
              columnName: access_point_id
              columnDataType: uuid