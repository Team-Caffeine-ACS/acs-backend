name: Lint and Format Check

# Controls when the workflow will run
on:
  pull_request:
    branches: [ main ] # Trigger only on PRs targeting main

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      # Skip three formatting/linting related steps
      skip_linting:
        description: 'Skip Java and Dockerfile linting? (true/false)'
        default: 'false'
        required: false

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Java Formatting
        if: github.event.inputs.skip_linting != 'true'
        run: mvn spotless:check

      - name: Java Linting with Checkstyle
        if: github.event.inputs.skip_linting != 'true'
        run: mvn checkstyle:check

      - name: Dockerfile Linting with Hadolint
        if: github.event.inputs.skip_linting != 'true'
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "**/Dockerfile*"
          recursive: true
